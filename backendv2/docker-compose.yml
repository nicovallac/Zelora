version: '3.9'

# ─── Vendly — Full Stack Docker Compose ────────────────────────────────────────
# Services: postgres, redis, web (Django ASGI), celery, celery-beat, nginx
#
# Usage:
#   Development:  docker-compose up
#   Production:   docker-compose -f docker-compose.yml up -d
#   Scale workers: docker-compose up --scale celery=3

x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  DB_HOST: postgres
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2

x-depends-on-infra: &depends-on-infra
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vendly_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-vendly_db}
      POSTGRES_USER: ${DB_USER:-vendly_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vendly_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vendly_user} -d ${DB_NAME:-vendly_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"  # Expose for local debugging

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vendly_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"  # Expose for local debugging

  # ─── Django ASGI (Web) ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vendly_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./logs:/app/logs
    <<: *depends-on-infra
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: vendly_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes:
      - ./logs:/app/logs
      - media_files:/app/media
    <<: *depends-on-infra
    command: >
      celery -A tasks.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-4}
      -Q default,ai,channels,campaigns
      --hostname=vendly-worker@%h
      --max-tasks-per-child=500

  # ─── Celery Beat (Scheduler) ────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: vendly_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes:
      - ./logs:/app/logs
    <<: *depends-on-infra
    command: >
      celery -A tasks.celery_app beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vendly_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      # Uncomment for SSL certificates:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
    name: vendly_postgres_data
  redis_data:
    name: vendly_redis_data
  static_files:
    name: vendly_static_files
  media_files:
    name: vendly_media_files

networks:
  default:
    name: vendly_network

# ─── Vendly — Nginx Reverse Proxy Configuration ────────────────────────────────
# Proxies:
#   /static/  → served directly from volume
#   /media/   → served directly from volume (or redirect to S3 CDN in prod)
#   /ws/      → WebSocket upgrade → gunicorn UvicornWorker
#   /         → HTTP API → gunicorn UvicornWorker

upstream vendly_api {
    server web:8000;
    keepalive 32;
}

# ─── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-Frame-Options           "DENY"                  always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Upload size (product images, KB documents) ───────────────────────────
    client_max_body_size 50M;
    client_body_timeout  30s;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml;

    # ── Static files (served directly by Nginx — very fast) ──────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ── Media files (avatars, KB docs, product images) ───────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── WebSocket — real-time inbox (/ws/inbox/, /ws/notifications/) ─────────
    location /ws/ {
        proxy_pass http://vendly_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket keepalive — 24 hours (browser should reconnect anyway)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Auth endpoints — stricter rate limit ─────────────────────────────────
    location ~ ^/api/auth/(login|signup)/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://vendly_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── WhatsApp webhook — must bypass rate limit & CSRF ─────────────────────
    location /api/channels/whatsapp/webhook {
        proxy_pass http://vendly_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API + Admin ───────────────────────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://vendly_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout  10s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;

        # Enable keepalive to upstream
        proxy_http_version 1.1;
        proxy_set_header Keep-Alive "";
    }

    # ── Health check (for load balancers) ────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass http://vendly_api/health;
    }
}
